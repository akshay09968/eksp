# kube-prometheus-stack values — staging: prod shape, week retention.

kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 7d

    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        memory: 4Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 50Gi

grafana:
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      memory: 384Mi

  # --- GitHub SSO (ADR-0019): Grafana's native auth.github. GITHUB-SSO-*
  # placeholders are filled by scripts/configure-repo.sh; the client id/secret
  # come from the grafana-github-oauth Secret the operator creates
  # (docs/RUNBOOK.md#github-sso). Both refs are optional so Grafana starts —
  # password login only — before SSO is configured.
  envValueFrom:
    GF_AUTH_GITHUB_CLIENT_ID:
      secretKeyRef:
        name: grafana-github-oauth
        key: client_id
        optional: true
    GF_AUTH_GITHUB_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-github-oauth
        key: client_secret
        optional: true
  grafana.ini:
    server:
      # OAuth callback base — <root_url>/login/github. Port-forward address
      # until Grafana gets a real host (issue #1).
      root_url: http://localhost:3000
    auth.github:
      enabled: true
      allow_sign_up: true
      scopes: read:org,user:email
      allowed_organizations: GITHUB-SSO-ORG
      # Platform team administers; everyone else in the org observes.
      role_attribute_path: "contains(groups[*], '@GITHUB-SSO-ORG/GITHUB-SSO-ADMIN-TEAM') && 'Admin' || 'Viewer'"

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
