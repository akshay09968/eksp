# RED dashboard for sample-api (Rate, Errors, Duration + saturation context),
# shipped as code via the Grafana sidecar. Color discipline: status hues carry
# status (2xx/4xx/5xx, threshold states); the latency quantile ladder is one blue
# hue at three lightness steps; never more than one y-axis per panel.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-sample-api-red
  labels:
    grafana_dashboard: "1"
data:
  sample-api-red.json: |
    {
      "title": "sample-api — RED",
      "uid": "eksp-sample-api-red",
      "tags": ["eksp", "slo"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "type": "stat", "title": "Requests/s", "id": 1,
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 0 },
          "targets": [{ "refId": "A", "expr": "sum(rate(http_requests_total{namespace=\"apps\", app=\"sample-api\"}[$__rate_interval]))" }],
          "fieldConfig": { "defaults": { "unit": "reqps", "decimals": 0, "color": { "mode": "fixed", "fixedColor": "text" } }, "overrides": [] },
          "options": { "graphMode": "area", "colorMode": "none" }
        },
        {
          "type": "stat", "title": "Error ratio (5m)", "id": 2,
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 0 },
          "targets": [{ "refId": "A", "expr": "sample_api:error_ratio:rate5m" }],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "decimals": 3,
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 0.0005 },
                { "color": "red", "value": 0.001 }
              ] }
            }, "overrides": []
          },
          "options": { "graphMode": "none", "colorMode": "value" }
        },
        {
          "type": "stat", "title": "p99 latency (5m)", "id": 3,
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 0 },
          "targets": [{ "refId": "A", "expr": "histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"apps\", app=\"sample-api\"}[5m])))" }],
          "fieldConfig": {
            "defaults": {
              "unit": "s", "decimals": 3,
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 0.1 },
                { "color": "red", "value": 0.15 }
              ] }
            }, "overrides": []
          },
          "options": { "graphMode": "none", "colorMode": "value" }
        },
        {
          "type": "timeseries", "title": "Request rate by status class", "id": 4,
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 4 },
          "targets": [
            { "refId": "A", "expr": "sum(rate(http_requests_total{namespace=\"apps\", app=\"sample-api\", code=~\"2..\"}[$__rate_interval]))", "legendFormat": "2xx" },
            { "refId": "B", "expr": "sum(rate(http_requests_total{namespace=\"apps\", app=\"sample-api\", code=~\"4..\"}[$__rate_interval]))", "legendFormat": "4xx" },
            { "refId": "C", "expr": "sum(rate(http_requests_total{namespace=\"apps\", app=\"sample-api\", code=~\"5..\"}[$__rate_interval]))", "legendFormat": "5xx" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "custom": { "lineWidth": 2, "fillOpacity": 8, "pointSize": 1 } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "2xx" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }] },
              { "matcher": { "id": "byName", "options": "4xx" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "yellow" } }] },
              { "matcher": { "id": "byName", "options": "5xx" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }] }
            ]
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } }
        },
        {
          "type": "timeseries", "title": "Latency quantiles", "id": 5,
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 4 },
          "targets": [
            { "refId": "A", "expr": "histogram_quantile(0.50, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"apps\", app=\"sample-api\"}[$__rate_interval])))", "legendFormat": "p50" },
            { "refId": "B", "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"apps\", app=\"sample-api\"}[$__rate_interval])))", "legendFormat": "p95" },
            { "refId": "C", "expr": "histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"apps\", app=\"sample-api\"}[$__rate_interval])))", "legendFormat": "p99" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s", "custom": { "lineWidth": 2, "fillOpacity": 0, "pointSize": 1 } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "p50" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "#8AB8FF" } }] },
              { "matcher": { "id": "byName", "options": "p95" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "#3274D9" } }] },
              { "matcher": { "id": "byName", "options": "p99" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "#1F60C4" } }] }
            ]
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } }
        },
        {
          "type": "timeseries", "title": "HPA replicas vs ceiling", "id": 6,
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 13 },
          "targets": [
            { "refId": "A", "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"apps\", horizontalpodautoscaler=\"sample-api\"}", "legendFormat": "current" },
            { "refId": "B", "expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace=\"apps\", horizontalpodautoscaler=\"sample-api\"}", "legendFormat": "max" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "decimals": 0, "custom": { "lineWidth": 2, "fillOpacity": 0 } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "max" }, "properties": [
                { "id": "color", "value": { "mode": "fixed", "fixedColor": "#C4162A" } },
                { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [10, 10] } }
              ] },
              { "matcher": { "id": "byName", "options": "current" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "#3274D9" } }] }
            ]
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } }
        }
      ]
    }
