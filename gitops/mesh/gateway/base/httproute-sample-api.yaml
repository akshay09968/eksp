# Route lives in the app namespace (owner: app team), attaches to the shared
# gateway cross-namespace — the Gateway API split-ownership model.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sample-api-external
  namespace: apps
spec:
  parentRefs:
    - name: eksp-gateway
      namespace: istio-ingress
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: 10s
      backendRefs:
        - name: sample-api
          port: 80
