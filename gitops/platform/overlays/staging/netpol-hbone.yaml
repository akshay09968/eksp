# Ambient mesh tunnels pod-to-pod traffic over HBONE (HTTP/2 CONNECT on 15008)
# between ztunnels. Default-deny must admit it or the mesh goes dark.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hbone
  namespace: apps
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - port: 15008
          protocol: TCP
