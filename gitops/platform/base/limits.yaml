# Guardrails for the apps namespace: unset requests get sane defaults (HPA and
# bin-packing break without requests); the quota bounds a runaway HPA or CI loop.
# Note the LimitRange sets NO default CPU limit — throttling latency-sensitive
# services on multicore nodes hurts more than it protects (see docs/adr/0012).
apiVersion: v1
kind: LimitRange
metadata:
  name: defaults
  namespace: apps
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        memory: 256Mi
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: apps-quota
  namespace: apps
spec:
  hard:
    requests.cpu: "256"
    requests.memory: 512Gi
    pods: "1000"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: defaults
  namespace: costwatch
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        memory: 256Mi
