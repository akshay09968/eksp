apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: eksp/sample-api
    newName: 000000000000.dkr.ecr.ap-south-1.amazonaws.com/eksp/sample-api # set by scripts/configure-repo.sh
    newTag: v0.1.0 # bumped by the CI promotion PR

patches:
  # Prod scales on requests-per-second (prometheus-adapter), not just CPU:
  # at 800 RPS/pod target, 17k RPS ⇒ ~22 pods; 3x spike ⇒ ~65 — well inside max.
  - target:
      kind: HorizontalPodAutoscaler
      name: sample-api
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 6
      - op: replace
        path: /spec/maxReplicas
        value: 200
      - op: add
        path: /spec/metrics/-
        value:
          type: Pods
          pods:
            metric:
              name: http_requests_per_second
            target:
              type: AverageValue
              averageValue: "800"

  - target:
      kind: HorizontalPodAutoscaler
      name: sample-worker
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 60

  # Percentages work at prod replica counts; zone spread becomes a hard rule.
  - target:
      kind: PodDisruptionBudget
      name: sample-api
    patch: |-
      - op: replace
        path: /spec/maxUnavailable
        value: 10%

  - target:
      kind: Deployment
      name: sample-api
    patch: |-
      - op: replace
        path: /spec/template/spec/topologySpreadConstraints/0/whenUnsatisfiable
        value: DoNotSchedule
