apiVersion: v1
kind: Service
metadata:
  name: sample-api
  labels:
    app: sample-api
spec:
  selector:
    app: sample-api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: sample-worker
  labels:
    app: sample-worker
spec:
  selector:
    app: sample-worker
  ports:
    - name: http
      port: 80
      targetPort: http
