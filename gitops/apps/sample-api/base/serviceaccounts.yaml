# Distinct identities per role — the mesh AuthorizationPolicy keys on the
# sample-api SA principal, so worker/API must not share one.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sample-api
automountServiceAccountToken: false # no kube-API or AWS access needed
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sample-worker
automountServiceAccountToken: false
