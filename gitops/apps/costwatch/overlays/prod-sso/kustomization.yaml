# prod + GitHub SSO (ADR-0019): everything in ../prod plus oauth2-proxy on an
# internal ALB. Enable by pointing the costwatch Application's `path:` at this
# overlay once the OAuth app + Secrets exist (docs/RUNBOOK.md#github-sso).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The component's resources are added here, past base's namespace transformer.
namespace: costwatch

resources:
  - ../prod

components:
  - ../../components/sso

# Scalar delta only (gitops/CLAUDE.md): same ALB, prod's log bucket.
patches:
  - target:
      kind: Ingress
      name: costwatch-sso
    patch: |-
      - op: replace
        path: /metadata/annotations/alb.ingress.kubernetes.io~1load-balancer-attributes
        value: >-
          idle_timeout.timeout_seconds=60,
          access_logs.s3.enabled=true,
          access_logs.s3.bucket=eksp-prod-lb-logs-000000000000,
          access_logs.s3.prefix=costwatch
