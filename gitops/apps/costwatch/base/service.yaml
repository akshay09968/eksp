# ClusterIP only — cost data stays private. Access: make costwatch-ui
# (port-forward), or the *-sso overlays' oauth2-proxy-fronted internal ALB
# (ADR-0019, docs/RUNBOOK.md#github-sso).
apiVersion: v1
kind: Service
metadata:
  name: costwatch
  labels:
    app: costwatch
spec:
  selector:
    app: costwatch
  ports:
    - name: http
      port: 80
      targetPort: http
