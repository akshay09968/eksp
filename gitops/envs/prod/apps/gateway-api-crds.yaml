# Kubernetes Gateway API CRDs (standard channel) — Istio's waypoint and
# HTTPRoute policy build on these.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  project: default
  source:
    repoURL: https://github.com/kubernetes-sigs/gateway-api.git
    # renovate: datasource=github-releases depName=kubernetes-sigs/gateway-api
    targetRevision: v1.3.0
    path: config/crd/standard
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: false # CRD deletion cascades to every route object — manual only
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
