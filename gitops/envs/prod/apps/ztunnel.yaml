# ztunnel: the per-node L4 proxy that carries ambient mTLS. This is why ambient
# scales where sidecars don't — one proxy per node, not per pod (ADR-0011).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ztunnel
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: ztunnel
    # renovate: datasource=helm depName=ztunnel registryUrl=https://istio-release.storage.googleapis.com/charts
    targetRevision: "1.30.2"
    helm:
      valuesObject:
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
