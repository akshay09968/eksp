# SLO burn-rate alerts, ops alerts, and the RED dashboard — config-as-code,
# synced after the stack exists.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/akshaydeshpande/eksp.git
    targetRevision: main
    path: gitops/observability/config
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
