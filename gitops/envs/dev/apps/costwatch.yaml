apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: costwatch
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/akshay09968/eksp.git
    targetRevision: main
    path: gitops/apps/costwatch/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: costwatch
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
