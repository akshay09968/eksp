# Spot-first pool. Higher weight wins when multiple pools satisfy a pod, so spot
# is always tried first; the on-demand pool (nodepool-fallback.yaml) catches
# capacity when spot is constrained. price-capacity-optimized allocation and wide
# instance diversity (c/m/r, gen 5+, both arches) keep interruption rates low.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general-spot
spec:
  weight: 100

  template:
    metadata:
      labels:
        eksp.io/node-role: workload
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: kubernetes.io/arch
          operator: In
          values: {{ toJson .Values.architectures }}
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      expireAfter: {{ .Values.expireAfter | quote }}

  limits:
    cpu: {{ .Values.cpuLimitSpot | quote }}

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
    budgets:
      {{- toYaml .Values.disruptionBudgets | nindent 6 }}
