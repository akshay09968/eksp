# On-demand fallback: lower weight than general-spot, so it only provisions when
# spot cannot satisfy the pod (capacity errors / interruption storms).
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general-on-demand
spec:
  weight: 10

  template:
    metadata:
      labels:
        eksp.io/node-role: workload
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: kubernetes.io/arch
          operator: In
          values: {{ toJson .Values.architectures }}
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      expireAfter: {{ .Values.expireAfter | quote }}

  limits:
    cpu: {{ .Values.cpuLimitOnDemand | quote }}

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
    budgets:
      {{- toYaml .Values.disruptionBudgets | nindent 6 }}
