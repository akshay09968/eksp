apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: {{ required "nodeIamRoleName is required" .Values.nodeIamRoleName | quote }}

  amiSelectorTerms:
    - alias: {{ .Values.amiAlias | quote }}

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ required "clusterName is required" .Values.clusterName | quote }}

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName | quote }}

  # IMDSv2 only, hop limit 1: containers off the host network cannot reach the
  # instance credentials endpoint.
  metadataOptions:
    httpEndpoint: enabled
    httpTokens: required
    httpPutResponseHopLimit: 1

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: {{ .Values.nodeVolumeSizeGi }}Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true

  {{- if .Values.connectionTracking.enabled }}
  connectionTracking:
    tcpEstablishedTimeout: {{ .Values.connectionTracking.tcpEstablishedTimeout }}
  {{- end }}

  tags:
    eksp.io/lifecycle: karpenter
