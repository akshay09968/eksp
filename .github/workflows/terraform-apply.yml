name: terraform-apply

# Applies are explicit: manual dispatch with an environment picker. Each GitHub
# environment (dev/staging/prod) carries its own protection rules — require
# reviewers on prod, and the OIDC trust in terraform/bootstrap already scopes
# the role to main + environments.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: environment to apply
        type: choice
        required: true
        options: [dev, staging, prod]

permissions:
  contents: read
  id-token: write

concurrency:
  group: apply-${{ inputs.environment }}

jobs:
  apply:
    name: apply (${{ inputs.environment }})
    if: vars.AWS_APPLY_ROLE_ARN != ''
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ vars.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.14.1"

      - name: init (S3 backend)
        uses: ./.github/actions/tf-init
        with:
          env: ${{ inputs.environment }}
          region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: plan → apply
        env:
          APPLY_ENV: ${{ inputs.environment }}
        run: |
          terraform -chdir="terraform/envs/${APPLY_ENV}" plan -input=false -out=tfplan
          terraform -chdir="terraform/envs/${APPLY_ENV}" apply -input=false tfplan
