name: terraform

on:
  pull_request:
    paths: ["terraform/**", ".github/workflows/terraform.yml"]
  push:
    branches: [main]
    paths: ["terraform/**"]

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.14.1"

jobs:
  static:
    name: fmt · validate · tflint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Providers are ~500MB across the roots; cache them keyed on lockfiles.
      - name: cache terraform providers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.terraform.d/plugin-cache
          key: tfproviders-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}

      - name: enable provider plugin cache
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir = "~/.terraform.d/plugin-cache"' > ~/.terraformrc

      - name: terraform fmt
        run: terraform fmt -check -recursive terraform/

      - name: validate all roots
        run: |
          for d in terraform/bootstrap terraform/envs/dev terraform/envs/staging terraform/envs/prod; do
            echo "== $d"
            terraform -chdir="$d" init -backend=false -input=false >/dev/null
            terraform -chdir="$d" validate
          done

      - name: terraform test (mocked, offline — all modules with tests)
        run: |
          for d in terraform/modules/*/tests; do
            m=$(dirname "$d"); echo "== $m"
            terraform -chdir="$m" init -backend=false -input=false >/dev/null
            terraform -chdir="$m" test
          done

      - uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1

      - name: tflint
        run: tflint --recursive --format compact

      - name: helm lint (karpenter-resources chart)
        run: helm lint terraform/charts/karpenter-resources

      - name: env parity guard (ADR-0002)
        run: ./scripts/check-env-parity.sh

  checkov:
    name: checkov security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12.3114.0
        with:
          directory: terraform
          quiet: true
          framework: terraform
          # Documented accepted findings only — keep this list short and honest.
          # CKV_AWS_39/38: public EKS endpoint is a deliberate, variable-gated
          # portfolio trade-off (prod refuses 0.0.0.0/0 via validation).
          skip_check: CKV_AWS_39,CKV_AWS_38

  plan:
    name: plan (${{ matrix.env }})
    # Same-repo PRs only (fork PRs get no OIDC token), only when the role is
    # configured, and never on a public repo unless explicitly overridden —
    # plan output (resource names, CIDRs, account topology) lands in public
    # logs/comments otherwise (AUDIT P0-2).
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      vars.AWS_PLAN_ROLE_ARN != '' &&
      (github.event.repository.private || vars.ALLOW_PUBLIC_PLAN_OUTPUT == 'true')
    needs: [static]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        env: [dev, staging, prod]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: init (S3 backend)
        uses: ./.github/actions/tf-init
        with:
          env: ${{ matrix.env }}
          region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: plan
        run: |
          terraform -chdir=terraform/envs/${{ matrix.env }} plan -input=false -lock=false -no-color 2>&1 \
            | tail -c 60000 > plan.txt

      # Plan text is PR-influenced input: it reaches the comment via the
      # filesystem + JS string building, never workflow-expression interpolation
      # (GitHub Actions injection guidance).
      - name: comment plan on PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          PLAN_ENV: ${{ matrix.env }}
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const fence = '`'.repeat(3);
            const body = ['### terraform plan — ' + process.env.PLAN_ENV, fence, plan, fence].join('\n');
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });
