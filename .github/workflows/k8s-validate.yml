name: k8s-validate

on:
  pull_request:
    paths: ["gitops/**", "scripts/validate-manifests.sh", ".github/workflows/k8s-validate.yml"]
  push:
    branches: [main]
    paths: ["gitops/**"]

permissions:
  contents: read

concurrency:
  group: k8s-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kubeconform:
    name: kustomize build → kubeconform (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: install kustomize + kubeconform
        run: |
          curl -sSLo /tmp/kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tar.gz -C /usr/local/bin kustomize
          curl -sSLo /tmp/kubeconform.tar.gz "https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform

      - name: validate every overlay and Application dir
        run: ./scripts/validate-manifests.sh
