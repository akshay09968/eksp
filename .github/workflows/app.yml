name: apps

on:
  pull_request:
    paths: ["apps/**", ".github/workflows/app.yml"]
  push:
    branches: [main]
    paths: ["apps/**"]

permissions:
  contents: read

concurrency:
  group: apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: sample-api
            dir: apps/sample-api
            coverage_floor: 80
          - app: costwatch
            dir: apps/costwatch/backend
            coverage_floor: 80
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
          cache-dependency-path: ${{ matrix.dir }}/go.sum

      - name: vet + test (race) + coverage floor
        working-directory: ${{ matrix.dir }}
        env:
          FLOOR: ${{ matrix.coverage_floor }}
        run: |
          go vet ./...
          go test -race -coverprofile=cover.out ./...
          total=$(go tool cover -func=cover.out | tail -1 | awk '{sub("%","",$3); print $3}')
          echo "coverage: ${total}% (floor: ${FLOOR}%)"
          awk -v t="$total" -v f="$FLOOR" 'BEGIN { exit (t+0 < f+0) ? 1 : 0 }'

  frontend:
    name: costwatch UI typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/costwatch/frontend/package-lock.json

      - name: test + build
        working-directory: apps/costwatch/frontend
        run: |
          npm ci
          npm run test
          npm run build

  publish:
    name: publish ${{ matrix.app }} → ECR + promotion PR
    # Only on main, only when the ECR role is configured.
    if: github.ref == 'refs/heads/main' && vars.AWS_ECR_PUSH_ROLE_ARN != ''
    needs: [test, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the promotion branch
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: sample-api
            context: apps/sample-api
            overlays: gitops/apps/sample-api/overlays
          - app: costwatch
            context: apps/costwatch
            overlays: gitops/apps/costwatch/overlays
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ vars.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        id: ecr

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: build + push (amd64 + arm64)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=v0.1.${{ github.run_number }}
          tags: ${{ steps.ecr.outputs.registry }}/eksp/${{ matrix.app }}:v0.1.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Supply chain gate (COMPLIANCE to-do #3): a HIGH/CRITICAL CVE in the
      # pushed image blocks the promotion PR — the image exists in ECR but
      # never reaches an overlay. .trivyignore documents accepted findings.
      - name: trivy gate (HIGH/CRITICAL block promotion)
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          image-ref: ${{ steps.ecr.outputs.registry }}/eksp/${{ matrix.app }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.10.1

      # Keyless signing: the signature binds this image digest to this exact
      # workflow identity (repo, ref, run) via the GitHub OIDC token.
      - name: cosign sign (keyless)
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/eksp/${{ matrix.app }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

      - name: SBOM (spdx) as run artifact
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.ecr.outputs.registry }}/eksp/${{ matrix.app }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          artifact-name: sbom-${{ matrix.app }}-v0.1.${{ github.run_number }}.spdx.json

      # The deploy IS a git change: bump the dev overlay tag and open a PR.
      # Merging it makes ArgoCD roll dev; staging/prod promote by cherry-pick.
      - name: bump dev overlay image tag
        env:
          APP: ${{ matrix.app }}
          OVERLAYS: ${{ matrix.overlays }}
          TAG: v0.1.${{ github.run_number }}
        run: |
          sed -i "s|newTag: .*# bumped by the CI promotion PR|newTag: ${TAG} # bumped by the CI promotion PR|" \
            "${OVERLAYS}/dev/kustomization.yaml"

      - name: open promotion PR
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          branch: promote/${{ matrix.app }}-v0.1.${{ github.run_number }}
          title: "deploy(${{ matrix.app }}): v0.1.${{ github.run_number }} to dev"
          commit-message: "deploy(${{ matrix.app }}): v0.1.${{ github.run_number }} to dev"
          body: |
            Image pushed to ECR by run ${{ github.run_id }}.
            Merging rolls **dev** via ArgoCD. Promote onward by applying the same
            bump to `staging`/`prod` overlays.
          labels: deploy
